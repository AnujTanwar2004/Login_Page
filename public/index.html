<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in or create an account</p>

        <div class="tabs">
          <button id="showLogin" class="tab active" type="button">Login</button>
          <button id="showRegister" class="tab" type="button">Register</button>
        </div>

        <form id="loginForm" class="form">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />

          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />

          <button type="submit" class="btn">Login</button>
        </form>

        <form id="registerForm" class="form hidden">
          <label>Name</label>
          <input type="text" id="registerName" placeholder="Your Name" required />

          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="you@example.com" required />

          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="Minimum 6 characters" required minlength="6" />

          <button type="submit" class="btn">Create Account</button>
        </form>

        <div id="message" class="message"></div>

        <div id="profile" class="profile hidden">
          <h2>Logged In</h2>
          <p id="profileText"></p>
          <button id="logoutBtn" type="button" class="btn btn-outline">Logout</button>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
